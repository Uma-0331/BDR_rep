<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Admin</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Add Admin</h2>

    <form action="/adminmodule/insertAdmin/" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Admin ID</label>
            <input type="text" name="admin_id" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Admin Name</label>
            <input type="text" name="admin_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Hospital Name</label>
            <input type="text" name="hospital_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="admin_email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="admin_phone" class="form-control" required>
        </div>

        <div class="mb-3">
             <label class="form-label">Status</label>
             <select name="status" class="form-control">
                 <option value="Active">Active</option>
                 <option value="Inactive">Inactive</option>
            </select>
        </div>

        

        <button type="submit" class="btn btn-success">
            Save Admin
        </button>

    </form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
