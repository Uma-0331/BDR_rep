<!DOCTYPE html>
<html>
<head>
    <title>Patient List</title>
</head>
<body>

<h2>Patient List</h2>

<a href="/add/">Add Patient</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Blood Group</th>
        <th>Phone</th>
        <th>Action</th>
    </tr>

    {% for patient in patients %}
    <tr>
        <td>{{ patient.patient_id }}</td>
        <td>{{ patient.patient_name }}</td>
        <td>{{ patient.age }}</td>
        <td>{{ patient.gender }}</td>
        <td>{{ patient.blood_group }}</td>
        <td>{{ patient.phone }}</td>
        <td>
            <a href="/edit/{{ patient.id }}/">Edit</a>
            <a href="/delete/{{ patient.id }}/">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
