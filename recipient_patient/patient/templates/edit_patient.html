<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
</head>
<body>

<h2>Edit Patient</h2>

<form method="POST">
    {% csrf_token %}

    Patient ID:
    <input type="text" name="patient_id" value="{{ patient.patient_id }}"><br><br>

    Name:
    <input type="text" name="patient_name" value="{{ patient.patient_name }}"><br><br>

    Age:
    <input type="number" name="age" value="{{ patient.age }}"><br><br>

    Gender:
    <input type="text" name="gender" value="{{ patient.gender }}"><br><br>

    Blood Group:
    <input type="text" name="blood_group" value="{{ patient.blood_group }}"><br><br>

    Phone:
    <input type="text" name="phone" value="{{ patient.phone }}"><br><br>

    <button type="submit">Update Patient</button>

</form>

</body>
</html>
