<!DOCTYPE html>
<html>
<head>
    <title>Update Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Update Admin</h2>

    <form action="/adminmodule/updateAdmin/{{admin.id}}/" method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Admin ID</label>
            <input type="text" name="admin_id"
                   value="{{admin.admin_id}}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Admin Name</label>
            <input type="text" name="admin_name"
                   value="{{admin.admin_name}}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
             <label>Hospital Name</label>
             <input type="text" name="hospital_name"
                    value="{{admin.hospital_name}}"
                    class="form-control" required>
        </div>

       <div class="mb-3">
            <label>Department</label>
            <input type="text" name="department"
                 value="{{admin.department}}"
                 class="form-control" required>
       </div>


        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="admin_email"
                   value="{{admin.admin_email}}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="admin_phone"
                   value="{{admin.admin_phone}}"
                   class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select name="status" class="form-control">

                <option value="Active"
                {% if admin.status == 'Active' %}selected{% endif %}>
                Active
                </option>

               <option value="Inactive"
               {% if admin.status == 'Inactive' %}selected{% endif %}>
               Inactive
               </option>

           </select>
        </div>
        
        <button type="submit" class="btn btn-primary">
            Update Admin
        </button>

        <a href="/adminmodule/" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

</body>
</html>
